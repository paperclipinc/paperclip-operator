version: "2"
run:
  timeout: 5m
  allow-parallel-runners: true
linters:
  default: none
  enable:
    - bodyclose
    - copyloopvar
    - dogsled
    - dupl
    - errcheck
    - ginkgolinter
    - gocheckcompilerdirectives
    - goconst
    - gocritic
    - gocyclo
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - misspell
    - nakedret
    - noctx
    - nolintlint
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
    - whitespace
  settings:
    dupl:
      threshold: 200
    goconst:
      min-len: 5
      min-occurrences: 4
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
    govet:
      enable:
        - shadow
    misspell:
      locale: US
    revive:
      rules:
        - name: comment-spacings
        - name: import-shadowing
        - name: unexported-return
          disabled: true
  exclusions:
    generated: lax
    rules:
      - linters:
          - dupl
          - goconst
          - gosec
          - gocritic
          - lll
        path: _test\.go
      - text: "SA5011"
        linters:
          - staticcheck
        path: _test\.go
      - linters:
          - gocritic
          - lll
        path: cmd/
      - linters:
          - lll
        path: api/*
      - linters:
          - dupl
          - lll
          - gocritic
        path: internal/*
    paths:
      - third_party$
      - builtin$
      - examples$
      - test/
      - cmd/
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/stubbi/paperclip-operator
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
